language = "C"
# Wrap the declarations in `extern "C"` under __cplusplus so the C header is
# usable directly from C++ (the adele-kde Qt plugin) — without it, C++ mangles
# the calls and they don't resolve against the cdylib's unmangled C symbols.
cpp_compat = true
header = "/* libadele_client_core — generated by cbindgen; do not edit by hand. */"
include_guard = "ADELE_CLIENT_CORE_H"
pragma_once = true
autogen_warning = "/* This file is auto-generated from the client-ui-ffi crate. Edit the Rust source and rebuild. */"
tab_width = 4
style = "type"
documentation = true
documentation_style = "c"

[export]
# `AdeleCore` is the opaque handle; everything else is the C ABI surface.
prefix = ""

[parse]
# Only this crate's `extern "C"` surface — never the dependency tree.
parse_deps = false

[fn]
sort_by = "None"

[enum]
prefix_with_name = true
